<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-garbage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="bin-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" rx="16" fill="url(#bg-grad-garbage)"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="200" cy="245" rx="80" ry="12" fill="#81C784" opacity="0.4"/>
  
  <!-- Garbage Bin -->
  <g transform="translate(150, 90)">
    <!-- Bin Body -->
    <path d="M 15 40 L 85 40 L 75 140 L 25 140 Z" fill="url(#bin-grad)"/>
    <!-- Lid (open/tilted) -->
    <g transform="rotate(-15, 15, 30)">
      <rect x="5" y="25" width="90" height="12" rx="4" fill="#1B5E20"/>
      <path d="M 35 25 L 40 15 L 60 15 L 65 25 Z" fill="#1B5E20"/>
    </g>
    <!-- Recycling Arrows on Bin -->
    <g transform="translate(37, 75) scale(0.8)" stroke="#E8F5E9" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 15 5 L 25 15 L 15 25"/>
      <path d="M 25 15 L 5 15 C 0 15 0 30 10 30"/>
      <path d="M 5 25 L 15 15 L 25 25" transform="rotate(120, 15, 15)"/>
    </g>
    <!-- Trash overflow -->
    <path d="M 22 35 C 22 20, 42 15, 52 28 C 58 20, 78 25, 78 38 Z" fill="#78909C"/>
    <!-- Crumpled papers / bottle -->
    <rect x="18" y="15" width="12" height="12" rx="2" fill="#ECEFF1" transform="rotate(25 18 15)"/>
    <circle cx="85" cy="142" r="6" fill="#FF8A65"/>
    <path d="M 80 145 L 95 135" stroke="#FF8A65" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Extra litter outside -->
  <g transform="translate(245, 210)">
    <path d="M 10 20 C 15 15, 25 15, 30 25 Z" fill="#90A4AE"/>
    <rect x="-15" y="15" width="14" height="20" rx="3" fill="#81D4FA" transform="rotate(-40)"/>
    <circle cx="-10" cy="22" r="3" fill="#0288D1"/>
  </g>

  <!-- Title / Label -->
  <rect x="140" y="25" width="120" height="30" rx="15" fill="#2E7D32"/>
  <text x="200" y="44" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1.5">GARBAGE</text>
</svg>
