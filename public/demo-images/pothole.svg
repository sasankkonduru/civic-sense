<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bg-grad-pothole" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="pavement" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#455A64"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" rx="16" fill="url(#bg-grad-pothole)"/>
  
  <!-- Stylized road/pavement perspective -->
  <path d="M 50 220 L 350 220 L 380 270 L 20 270 Z" fill="url(#pavement)"/>
  <path d="M 200 220 L 200 270" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="10 10" opacity="0.6"/>
  
  <!-- Pothole cracks -->
  <path d="M 120 235 Q 110 230 90 232 T 70 235" stroke="#263238" stroke-width="3" fill="none"/>
  <path d="M 250 245 Q 270 250 290 248 T 310 255" stroke="#263238" stroke-width="3" fill="none"/>
  
  <!-- Main Pothole Hole -->
  <ellipse cx="200" cy="245" rx="50" ry="15" fill="#1A252C"/>
  <ellipse cx="195" cy="247" rx="42" ry="11" fill="#0D1317"/>
  
  <!-- Alert Indicator / Cone -->
  <g transform="translate(140, 140)">
    <!-- Cone -->
    <path d="M 30 10 L 50 10 L 70 70 L 10 70 Z" fill="#FF9800"/>
    <path d="M 36 30 L 44 30 L 48 45 L 32 45 Z" fill="#FFFFFF"/>
    <ellipse cx="40" cy="70" rx="35" ry="5" fill="#FF9800"/>
    <ellipse cx="40" cy="74" rx="30" ry="4" fill="#E65100" opacity="0.4"/>
  </g>
  
  <g transform="translate(210, 130)">
    <!-- Orange Alert Sign -->
    <path d="M 25 5 L 45 40 L 5 40 Z" fill="#FF5722"/>
    <circle cx="25" cy="35" r="2.5" fill="#FFFFFF"/>
    <rect x="23" y="18" width="4" height="12" rx="2" fill="#FFFFFF"/>
  </g>

  <!-- Title / Label -->
  <rect x="140" y="25" width="120" height="30" rx="15" fill="#E65100"/>
  <text x="200" y="44" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1.5">POTHOLE</text>
</svg>
