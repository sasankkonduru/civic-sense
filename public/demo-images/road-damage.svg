<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-road" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" rx="16" fill="url(#bg-grad-road)"/>
  
  <!-- Damaged Road Perspective -->
  <path d="M 60 210 L 340 210 L 380 270 L 20 270 Z" fill="url(#road)"/>
  
  <!-- Large Road Crack / Fissure -->
  <path d="M 120 220 L 140 240 L 110 250 L 150 265" stroke="#1A237E" stroke-width="5" fill="none" stroke-linejoin="round"/>
  <path d="M 280 215 L 260 235 L 290 255 L 270 268" stroke="#1A237E" stroke-width="4" fill="none" stroke-linejoin="round"/>
  
  <!-- Construction Barrier / Barricade -->
  <g transform="translate(110, 110)">
    <!-- Left post -->
    <rect x="10" y="20" width="8" height="90" fill="#78909C"/>
    <!-- Right post -->
    <rect x="160" y="20" width="8" height="90" fill="#78909C"/>
    
    <!-- Stripe Boards -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="178" height="15" fill="#FFD54F"/>
      <path d="M 10 0 L 25 15 M 40 0 L 55 15 M 70 0 L 85 15 M 100 0 L 115 15 M 130 0 L 145 15 M 160 0 L 175 15" stroke="#D32F2F" stroke-width="6"/>
    </g>
    <g transform="translate(0, 55)">
      <rect x="0" y="0" width="178" height="15" fill="#FFD54F"/>
      <path d="M 10 0 L 25 15 M 40 0 L 55 15 M 70 0 L 85 15 M 100 0 L 115 15 M 130 0 L 145 15 M 160 0 L 175 15" stroke="#D32F2F" stroke-width="6"/>
    </g>
    
    <!-- Base feet -->
    <rect x="0" y="105" width="28" height="8" rx="2" fill="#37474F"/>
    <rect x="150" y="105" width="28" height="8" rx="2" fill="#37474F"/>
  </g>
  
  <!-- Warning sign -->
  <g transform="translate(185, 75)">
    <polygon points="15,0 30,26 0,26" fill="#D32F2F"/>
    <polygon points="15,3 27,24 3,24" fill="#FFFFFF"/>
    <rect x="14" y="9" width="3" height="8" rx="1" fill="#D32F2F"/>
    <circle cx="15.5" cy="20" r="1.8" fill="#D32F2F"/>
  </g>

  <!-- Title / Label -->
  <rect x="130" y="25" width="140" height="30" rx="15" fill="#C62828"/>
  <text x="200" y="44" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1.5">ROAD DAMAGE</text>
</svg>
