<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-water" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="pipe-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <linearGradient id="water-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" rx="16" fill="url(#bg-grad-water)"/>
  
  <!-- Pipe network background -->
  <rect x="50" y="120" width="300" height="40" rx="6" fill="url(#pipe-grad)"/>
  <rect x="180" y="115" width="20" height="50" rx="3" fill="#37474F"/>
  
  <!-- Pipe crack and spray -->
  <g transform="translate(190, 140)">
    <!-- Crack lines -->
    <path d="M -20 -5 L -5 5 L 10 -8" stroke="#263238" stroke-width="3" fill="none"/>
    
    <!-- Water Jet Spray -->
    <path d="M -10 -5 C -30 -40, -50 -50, -80 -45 C -50 -35, -25 -20, -10 -5 Z" fill="url(#water-grad)" opacity="0.8"/>
    <path d="M -5 2 C 10 40, 30 60, 60 70 C 35 50, 15 30, -5 2 Z" fill="url(#water-grad)" opacity="0.8"/>
    <path d="M 0 -2 C 20 -30, 50 -45, 80 -35 C 45 -25, 20 -10, 0 -2 Z" fill="url(#water-grad)" opacity="0.8"/>
    
    <!-- Water Drops -->
    <circle cx="-60" cy="-25" r="5" fill="#29B6F6"/>
    <circle cx="45" cy="45" r="4" fill="#29B6F6"/>
    <circle cx="60" cy="-15" r="6" fill="#0288D1"/>
  </g>
  
  <!-- Puddle on Ground -->
  <ellipse cx="200" cy="240" rx="110" ry="18" fill="#29B6F6" opacity="0.6"/>
  <ellipse cx="190" cy="242" rx="80" ry="12" fill="#0288D1" opacity="0.8"/>
  <ellipse cx="160" cy="241" rx="40" ry="6" fill="#E3F2FD" opacity="0.5"/>

  <!-- Title / Label -->
  <rect x="130" y="25" width="140" height="30" rx="15" fill="#0D47A1"/>
  <text x="200" y="44" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1.5">WATER LEAK</text>
</svg>
